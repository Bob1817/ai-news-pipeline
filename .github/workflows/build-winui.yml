name: Build WinUI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        dotnet-quality: 'ga'

    - name: Setup NuGet
      run: |
        nuget sources update -Name nuget.org -Source https://api.nuget.org/v3/index.json

    - name: Verify .NET version
      run: |
        Write-Host "=== .NET Version ==="
        dotnet --version
        Write-Host "=== Available SDKs ==="
        dotnet --list-sdks
        Write-Host "=== Environment PATH ==="
        $env:PATH -split ';' | Where-Object { $_ -match 'dotnet' } | ForEach-Object { Write-Host $_ }

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Clean
      run: |
        if (Test-Path "WinUI/AINewsPipeline.WinUI/bin") { Remove-Item -Recurse -Force "WinUI/AINewsPipeline.WinUI/bin" }
        if (Test-Path "WinUI/AINewsPipeline.WinUI/obj") { Remove-Item -Recurse -Force "WinUI/AINewsPipeline.WinUI/obj" }
        if (Test-Path "WinUI/AINewsPipeline.Package/bin") { Remove-Item -Recurse -Force "WinUI/AINewsPipeline.Package/bin" }
        if (Test-Path "WinUI/AINewsPipeline.Package/obj") { Remove-Item -Recurse -Force "WinUI/AINewsPipeline.Package/obj" }

    - name: Restore
      run: dotnet restore WinUI/AINewsPipeline.WinUI.sln

    - name: Build App
      run: |
        msbuild WinUI/AINewsPipeline.WinUI/AINewsPipeline.WinUI.csproj
        /t:Build
        /p:Configuration=Release
        /p:Platform=x64
        /v:minimal

    - name: Package MSIX
      run: |
        msbuild WinUI/AINewsPipeline.Package/AINewsPipeline.Package.wapproj
        /t:Build
        /p:Configuration=Release
        /p:Platform=x64
        /p:AppxBundle=Never
        /v:minimal

    - name: Show build output
      if: always()
      run: |
        Write-Host "=== Build Output ==="
        if (Test-Path "WinUI/AINewsPipeline.Package\bin\x64\Release") {
          Get-ChildItem "WinUI/AINewsPipeline.Package\bin\x64\Release" -Recurse | ForEach-Object { Write-Host $_.FullName }
        }
        if (Test-Path "WinUI/AINewsPipeline.WinUI\bin\x64\Release") {
          Get-ChildItem "WinUI/AINewsPipeline.WinUI\bin\x64\Release" -Recurse | ForEach-Object { Write-Host $_.FullName }
        }

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: winui-build
        path: |
          WinUI/AINewsPipeline.Package/bin/x64/Release/**/*.appx
          WinUI/AINewsPipeline.Package/bin/x64/Release/**/*.msix
          WinUI/AINewsPipeline.WinUI/bin/x64/Release/publish/**
        retention-days: 7

  release:
    needs: build
    runs-on: windows-latest
    if: github.event_name == 'release' && github.event.action == 'created'

    steps:
    - uses: actions/checkout@v4

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: winui-build
        path: winui-build

    - name: Find MSIX/AppX files
      run: |
        Write-Host "=== Looking for MSIX/AppX files ==="
        Get-ChildItem -Recurse -Path winui-build | Where-Object { $_.Extension -match '\.(msix|appx)$' } | ForEach-Object { Write-Host "Found: $($_.FullName)" }

    - name: Create Release Assets
      uses: softprops/action-gh-release@v1
      with:
        files: |
          winui-build/**/*.msix
          winui-build/**/*.appx
        fail_on_unmatched_files: true
