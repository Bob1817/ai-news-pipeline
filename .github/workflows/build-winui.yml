name: Build WinUI

on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore
      run: dotnet restore WinUI/AINewsPipeline.WinUI/AINewsPipeline.WinUI.csproj

    - name: Build
      id: build
      run: >
        msbuild WinUI/AINewsPipeline.WinUI/AINewsPipeline.WinUI.csproj
        /t:Publish
        /p:Configuration=Release
        /p:RuntimeIdentifier=win-x64
        /p:SelfContained=true
        /p:PublishDir=bin/win-x64
        /v:diag 2>&1 | Out-File build.log

    - name: Show errors
      if: always()
      run: |
        Write-Host "========== ERRORS =========="
        Select-String -Path build.log -Pattern "error " | ForEach-Object { Write-Host $_.Line }
        Write-Host "========== END =========="

    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
